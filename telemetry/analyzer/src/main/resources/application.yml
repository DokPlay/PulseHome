spring:
  application:
    name: analyzer
  profiles:
    default: dev
  main:
    web-application-type: none
  datasource:
    url: ${ANALYZER_DATASOURCE_URL}
    username: ${ANALYZER_DATASOURCE_USERNAME}
    password: ${ANALYZER_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

analyzer:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    topics:
      hubs: telemetry.hubs.v1
      hubs-dlq: telemetry.hubs.dlq.v1
      snapshots: telemetry.snapshots.v1
    hubs-consumer:
      group-id: analyzer-hubs
      client-id-prefix: analyzer-hubs
      poll-timeout: 1s
      max-poll-records: 50
      auto-offset-reset: earliest
    snapshots-consumer:
      group-id: analyzer-snapshots
      client-id-prefix: analyzer-snapshots
      poll-timeout: 1s
      max-poll-records: 100
      auto-offset-reset: earliest
  grpc:
    hub-router:
      action-timeout: 3s

grpc:
  client:
    hub-router:
      address: ${GRPC_HUB_ROUTER_ADDRESS}
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: ${GRPC_HUB_ROUTER_NEGOTIATION_TYPE}
