spring:
  application:
    name: collector
  profiles:
    default: dev
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

collector:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    send-timeout: ${COLLECTOR_KAFKA_SEND_TIMEOUT:10s}
    topic-bootstrap-enabled: ${COLLECTOR_KAFKA_TOPIC_BOOTSTRAP_ENABLED:false}
    topic-bootstrap-timeout: ${COLLECTOR_KAFKA_TOPIC_BOOTSTRAP_TIMEOUT:10s}
    producer:
      acks: all
      enable-idempotence: true
      compression-type: snappy
      linger-ms: 5
      batch-size: 32768
      max-in-flight-requests-per-connection: 5
    topics:
      sensors: telemetry.sensors.v1
      hubs: telemetry.hubs.v1
