spring:
  application:
    name: collector
  profiles:
    default: dev

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

# Custom properties used by CollectorKafkaProperties
collector:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    send-timeout: ${COLLECTOR_KAFKA_SEND_TIMEOUT:10s}
    topic-bootstrap-enabled: ${COLLECTOR_KAFKA_TOPIC_BOOTSTRAP_ENABLED:false}
    topic-bootstrap-timeout: ${COLLECTOR_KAFKA_TOPIC_BOOTSTRAP_TIMEOUT:10s}
    producer:
      # Collector builds Kafka producers explicitly from this block.
      acks: all
      enable-idempotence: true
      compression-type: snappy
      linger-ms: 5
      batch-size: 32768
      max-in-flight-requests-per-connection: 5
    ssl:
      security-protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      pqc-require: ${KAFKA_SSL_PQC_REQUIRE:true}
      truststore-location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:}
      truststore-password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:}
      keystore-location: ${KAFKA_SSL_KEYSTORE_LOCATION:}
      keystore-password: ${KAFKA_SSL_KEYSTORE_PASSWORD:}
      key-password: ${KAFKA_SSL_KEY_PASSWORD:}
    topics:
      sensors: telemetry.sensors.v1
      hubs: telemetry.hubs.v1
