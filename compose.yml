services:
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    environment:
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PULSEHOME_POSTGRES_DB:-analyzer}
      POSTGRES_USER: ${PULSEHOME_POSTGRES_USER:?Set PULSEHOME_POSTGRES_USER in your environment or .env}
      POSTGRES_PASSWORD: ${PULSEHOME_POSTGRES_PASSWORD:?Set PULSEHOME_POSTGRES_PASSWORD in your environment or .env}
    ports:
      - "5432:5432"
    volumes:
      - pulsehome-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12

  hub-router-stub:
    build:
      context: .
      dockerfile: Dockerfile
      target: hub-router-stub
    restart: unless-stopped
    environment:
      HUB_ROUTER_STUB_PORT: 59090
    ports:
      - "59090:59090"

  collector:
    build:
      context: .
      dockerfile: Dockerfile
      target: collector
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      COLLECTOR_BASIC_AUTH_USERNAME: ${COLLECTOR_BASIC_AUTH_USERNAME:-collector}
      COLLECTOR_BASIC_AUTH_PASSWORD: ${COLLECTOR_BASIC_AUTH_PASSWORD:?Set COLLECTOR_BASIC_AUTH_PASSWORD in your environment or .env}
      COLLECTOR_KAFKA_TOPIC_BOOTSTRAP_ENABLED: "true"
    ports:
      - "8080:8080"

  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
      target: aggregator
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AGGREGATOR_KAFKA_TOPIC_BOOTSTRAP_ENABLED: "true"

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile
      target: analyzer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hub-router-stub:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANALYZER_KAFKA_TOPIC_BOOTSTRAP_ENABLED: "true"
      ANALYZER_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PULSEHOME_POSTGRES_DB:-analyzer}
      ANALYZER_DATASOURCE_USERNAME: ${PULSEHOME_POSTGRES_USER:?Set PULSEHOME_POSTGRES_USER in your environment or .env}
      ANALYZER_DATASOURCE_PASSWORD: ${PULSEHOME_POSTGRES_PASSWORD:?Set PULSEHOME_POSTGRES_PASSWORD in your environment or .env}
      GRPC_HUB_ROUTER_ADDRESS: static://hub-router-stub:59090
      GRPC_HUB_ROUTER_NEGOTIATION_TYPE: plaintext

volumes:
  pulsehome-postgres-data:
